[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "wormhole-foundation/=lib/wormhole/",
    "@openzeppelin/=lib/openzeppelin-contracts/"
]

[rpc_endpoints]
arbitrum_sepolia = "https://sepolia-rollup.arbitrum.io/rpc"

[etherscan]
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}" }