version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci --cache .npm --prefer-offline
            - npm run build --workspace=packages/frontend
        build:
          commands:
            - echo "Build completed in preBuild phase"
      artifacts:
        baseDirectory: packages/frontend/.next
        files:
          - '**/*'
      cache:
        paths:
          - packages/frontend/.next/cache/**/*
          - .npm/**/*
          - node_modules/**/*
