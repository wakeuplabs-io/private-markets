version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install --cache .npm --prefer-offline
        - npm run build --workspace=packages/frontend
    build:
      commands:
        - cd packages/frontend && NODE_OPTIONS="--max-old-space-size=4096" yarn build
  artifacts:
    baseDirectory: packages/frontend/out
    files:
      - '**/*'
  cache:
    paths:
      - packages/frontend/.next/cache/**/*
      - packages/frontend/out/**/*
      - .npm/**/*
      - node_modules/**/*
